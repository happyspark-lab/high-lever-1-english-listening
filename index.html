<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英语单词闯关</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4338ca;
            --primary-light: #e0e7ff;
            --accent: #f59e0b;
            --accent-light: #fef3c7;
            --success: #10b981;
            --success-light: #d1fae5;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --bg: linear-gradient(135deg, #ede9fe 0%, #e0e7ff 50%, #dbeafe 100%);
            --card: rgba(255,255,255,0.96);
            --text: #1e1b4b;
            --sub: #6b7280;
            --border: rgba(99,102,241,0.15);
            --shadow: 0 8px 32px rgba(99,102,241,0.15);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            padding: 12px;
        }
        /* ===== SCREENS ===== */
        .screen { display:none; }
        .screen.active { display:block; }

        /* ===== COMMON ===== */
        .card {
            background: var(--card);
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            padding: 22px 18px;
        }
        .btn {
            border: none; border-radius: 50px; font-weight: 800;
            cursor: pointer; transition: all 0.15s; display: flex;
            align-items: center; justify-content: center; gap: 6px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4338ca);
            color: white; padding: 14px 24px; font-size: 1.1rem;
            width: 100%; box-shadow: 0 6px 20px rgba(99,102,241,0.35);
        }
        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white; padding: 14px 24px; font-size: 1.1rem;
            width: 100%; box-shadow: 0 6px 20px rgba(16,185,129,0.35);
        }
        .btn-accent {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white; padding: 14px 24px; font-size: 1.1rem;
            width: 100%; box-shadow: 0 6px 20px rgba(245,158,11,0.35);
        }
        .btn-sm {
            padding: 8px 16px; font-size: 0.85rem; border-radius: 20px;
            font-weight: 700; border: none; cursor: pointer;
        }
        .btn-outline {
            background: transparent; border: 2px solid var(--primary);
            color: var(--primary); padding: 10px 18px; font-size: 0.9rem;
        }
        input[type="text"], input[type="number"] {
            width: 100%; padding: 14px 16px; border: 2px solid #e0e7ff;
            border-radius: 12px; font-size: 1rem; outline: none;
            transition: border-color 0.2s; background: #fafafe;
        }
        input:focus { border-color: var(--primary); background: white; }
        label { display:block; font-weight:700; margin-bottom:6px; color:#4338ca; font-size:0.9rem; }
        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700;
        }
        .badge-purple { background: var(--primary-light); color: var(--primary-dark); }
        .badge-green  { background: var(--success-light); color: #065f46; }
        .badge-amber  { background: var(--accent-light);  color: #92400e; }
        .badge-red    { background: var(--danger-light);  color: #991b1b; }
        select {
            width: 100%; padding: 10px 12px; border: 2px solid #e0e7ff;
            border-radius: 10px; font-size: 0.95rem; background: white;
            font-weight: 700; color: var(--text); outline: none;
        }
        select:focus { border-color: var(--primary); }
        .divider { height:1px; background:#e0e7ff; margin:14px 0; }
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .page-title { font-size: 1.15rem; font-weight: 800; color: var(--text); }
        .back-btn {
            background: var(--primary-light); color: var(--primary-dark);
            border: none; border-radius: 20px; padding: 6px 14px;
            font-weight: 700; font-size: 0.85rem; cursor: pointer;
        }

        /* ===== SCREEN 1: LOGIN ===== */
        #screen-login {
            max-width: 420px; margin: 0 auto;
            padding-top: 40px;
        }
        .login-hero {
            text-align: center; margin-bottom: 28px;
        }
        .login-hero .emoji { font-size: 4rem; margin-bottom: 8px; display:block; }
        .login-hero h1 { font-size: 1.8rem; color: var(--primary-dark); font-weight:900; }
        .login-hero p  { color: var(--sub); font-size:0.9rem; margin-top:4px; }
        .user-list { margin-top: 16px; }
        .user-list-title { font-size: 0.8rem; color: var(--sub); margin-bottom: 8px; }
        .user-chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 14px; background: var(--primary-light); border-radius: 20px;
            margin: 4px; cursor: pointer; font-weight:700; color: var(--primary-dark);
            font-size:0.9rem; border:2px solid transparent; transition:all 0.15s;
        }
        .user-chip:active { border-color: var(--primary); transform: scale(0.97); }
        .ios-tip {
            background: #fff7ed; border: 1px solid #fed7aa; border-radius:10px;
            padding: 10px 12px; font-size:0.8rem; color:#9a3412; margin-bottom:12px; display:none;
        }

        /* ===== SCREEN 2: HOME ===== */
        #screen-home { max-width: 480px; margin: 0 auto; }
        .home-topbar {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 12px; gap: 8px;
        }
        .stat-chip {
            flex: 1; background: var(--card); border-radius: 14px;
            padding: 10px 10px; text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer;
            border: 1px solid var(--border); transition: all 0.15s;
        }
        .stat-chip:active { transform: scale(0.97); }
        .stat-chip .num { font-size: 1.4rem; font-weight:900; color: var(--primary-dark); }
        .stat-chip .lbl { font-size: 0.65rem; color: var(--sub); margin-top:1px; }
        .stat-streak .num { color: #d97706; }
        .stat-mastered .num { color: #059669; }
        .stat-error .num   { color: #dc2626; }
        .greeting-bar {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--card); border-radius: 14px; padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .greeting-name { font-size: 1rem; font-weight:800; color: var(--text); }
        .greeting-sub  { font-size: 0.75rem; color: var(--sub); margin-top:2px; }
        .switch-user-btn {
            background: #f0f0f8; border: none; border-radius:20px;
            padding: 6px 12px; font-size:0.75rem; font-weight:700; color:var(--sub); cursor:pointer;
        }
        .selector-row {
            display:flex; gap:8px; margin-bottom:10px;
        }
        .selector-row select { flex:1; }
        .settings-row {
            display:flex; gap:8px; margin:12px 0;
        }
        .setting-group {
            flex:1; background:#f8f7ff; border-radius:10px;
            padding:8px 6px; border:1px solid var(--border); text-align:center;
        }
        .setting-group label { font-size:0.7rem; color:var(--sub); margin-bottom:3px; text-align:center; }
        .setting-group select { font-size:0.85rem; padding:4px 2px; border:none; background:transparent; }
        .review-alert {
            background: linear-gradient(135deg,#fef3c7,#fde68a);
            border:2px solid #f59e0b; border-radius:14px;
            padding:14px 16px; margin-bottom:12px; display:none;
        }
        .review-alert-title { font-weight:800; color:#92400e; font-size:0.95rem; }
        .review-alert-sub   { font-size:0.8rem; color:#a16207; margin-top:4px; }

        /* ===== WORD PREVIEW ===== */
        .preview-section { margin-top: 10px; }
        .preview-label { font-size:0.8rem; font-weight:700; color:var(--primary-dark); margin-bottom:8px; }
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 8px; max-height: 260px; overflow-y:auto;
        }
        .preview-item {
            background: white; border:1px solid var(--border);
            border-radius: 10px; padding: 10px 6px; text-align:center;
        }
        .preview-item .word { font-size: 1.8rem; font-weight:900; color:var(--text); word-break:break-all; line-height:1.2; }
        .preview-item .cn   { font-size: 0.75rem; color: var(--sub); margin-top:3px; }
        .preview-item .num  { font-size:0.65rem; color:#aaa; display:block; margin-bottom:2px; }

        /* ===== SCREEN 3: DICTATION RUNNING ===== */
        #screen-running { max-width: 480px; margin: 0 auto; }
        .run-header { text-align:center; margin-bottom:12px; }
        .run-unit-badge {
            background: var(--primary-light); color: var(--primary-dark);
            border-radius:20px; padding:5px 14px; font-size:0.8rem; font-weight:700;
            display:inline-block;
        }
        .progress-wrap { margin:10px 0; }
        .progress-bar {
            height: 10px; background:#e0e7ff; border-radius:10px; overflow:hidden;
        }
        .progress-fill {
            height:100%;
            background: linear-gradient(90deg, #6366f1, #a78bfa);
            width:0%; transition:width 0.3s ease-out;
            border-radius:10px;
        }
        .progress-text { text-align:right; font-size:0.75rem; color:var(--sub); margin-top:3px; }
        .word-stage {
            text-align:center; padding: 20px 10px;
        }
        .word-ordinal {
            font-size: 0.85rem; color: var(--sub); margin-bottom:8px;
        }
        .big-word {
            font-size: 2.8rem; font-weight:900; color: var(--text);
            min-height: 70px; letter-spacing:2px; word-break:break-all;
            line-height: 1.2;
        }
        .status-msg { color:var(--sub); font-size:0.9rem; margin-top:8px; min-height:24px; }
        .countdown-ring {
            width:54px; height:54px; margin:10px auto;
        }
        .countdown-ring svg { width:54px; height:54px; transform:rotate(-90deg); }
        .countdown-ring circle { fill:none; stroke:#e0e7ff; stroke-width:5; }
        .countdown-ring .arc { stroke:#6366f1; stroke-linecap:round; transition:stroke-dashoffset 0.1s linear; }
        .countdown-num {
            position:relative; top:-42px; text-align:center;
            font-size:1.1rem; font-weight:900; color:var(--primary-dark);
        }
        .run-btns { display:flex; gap:10px; margin-top:6px; }
        .run-btn {
            flex:1; padding:11px; border-radius:12px; border:none;
            font-weight:700; font-size:0.9rem; cursor:pointer;
        }
        .run-btn-pause { background:#e0e7ff; color:#4338ca; }
        .run-btn-stop  { background:#fee2e2; color:#b91c1c; }

        /* ===== SCREEN 4: RESULT ===== */
        #screen-result { max-width: 480px; margin: 0 auto; }
        .result-hero { text-align:center; padding:16px 0 10px; }
        .result-star { font-size:3rem; }
        .result-title { font-size:1.3rem; font-weight:900; margin-top:6px; color:var(--primary-dark); }
        .result-score { font-size:2.2rem; font-weight:900; color:var(--success); margin:6px 0; }
        .result-streak { font-size:0.9rem; color:var(--sub); }
        .result-encourage {
            background: linear-gradient(135deg,#e0e7ff,#dbeafe);
            border-radius:12px; padding:12px 16px; margin:12px 0;
            font-weight:700; color:#3730a3; text-align:center; font-size:0.95rem;
        }
        .answer-check-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px,1fr));
            gap: 8px; margin-top:10px;
        }
        .answer-check-item {
            background: white; border:2px solid #e0e7ff;
            border-radius: 10px; padding: 10px 6px;
            text-align:center; position:relative;
        }
        .answer-check-item .word { font-size: 1.8rem; font-weight:900; color:var(--text); word-break:break-all; line-height:1.2; }
        .answer-check-item .cn   { font-size: 0.75rem; color: var(--sub); margin-top:3px; }
        .answer-check-item .num  { font-size:0.65rem; color:#aaa; display:block; margin-bottom:2px; }
        .answer-check-item.wrong { border-color:#fca5a5; background:#fff1f2; }
        .answer-check-item.wrong .word { color:#b91c1c; }
        .check-box {
            position: absolute; top:4px; right:4px;
            width:20px; height:20px; border-radius:5px;
            border:2px solid #d1d5db; background:white; cursor:pointer;
            display:flex; align-items:center; justify-content:center; font-size:0.7rem;
        }
        .check-box.checked { background:#fee2e2; border-color:#fca5a5; color:#b91c1c; }
        .result-summary {
            display:flex; gap:10px; justify-content:center; margin:12px 0;
        }
        .summary-chip {
            padding:8px 16px; border-radius:20px; font-weight:700; font-size:0.85rem;
        }

        /* ===== SCREEN 5: MASTERED / ERROR BOOK ===== */
        #screen-mastered, #screen-errors { max-width: 480px; margin: 0 auto; }
        .word-list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px,1fr));
            gap:8px; margin-top:10px;
        }
        .word-card {
            background:white; border:1px solid var(--border); border-radius:10px;
            padding:10px 6px; text-align:center;
        }
        .word-card .w  { font-size:1.1rem; font-weight:800; color:var(--text); word-break:break-all; }
        .word-card .wc { font-size:0.72rem; color:var(--sub); margin-top:2px; }
        .word-card .cnt{ font-size:0.7rem; color:var(--sub); margin-top:3px; }
        .empty-tip { text-align:center; color:var(--sub); padding:30px; font-size:0.9rem; }

        /* ===== ANIMATIONS ===== */
        @keyframes popIn  { 0%{transform:scale(0.85);opacity:0} 100%{transform:scale(1);opacity:1} }
        @keyframes shake  { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .pop-in  { animation: popIn  0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
        .bounce  { animation: bounce 0.6s ease both; }
        .shake   { animation: shake  0.4s ease both; }
    </style>
</head>
<body>

<!-- ==================== SCREEN 1: LOGIN ==================== -->
<div id="screen-login" class="screen active">
    <div class="login-hero">
        <span class="emoji">🚀</span>
        <h1>英语单词闯关</h1>
        <p>每天坚持，成为单词大师！</p>
    </div>

    <div id="iosTip" class="ios-tip">
        📱 <b>iPhone用户：</b>请关闭侧边静音键，调大媒体音量再开始。
    </div>

    <div class="card">
        <!-- 已有账号快捷列表 -->
        <div id="existing-users-box" class="user-list" style="display:none">
            <div class="user-list-title">本设备已有账号，点击直接进入：</div>
            <div id="user-chips"></div>
            <div class="divider"></div>
        </div>

        <!-- 学号输入 -->
        <div>
            <label>输入学号 ID</label>
            <input type="text" id="login-id" placeholder="例如：S001" maxlength="20"
                   onkeydown="if(event.key==='Enter') doLogin()">
        </div>
        <div style="font-size:0.78rem;color:var(--sub);margin:6px 0 14px;">
            首次输入学号会自动创建账号，数据保存在本设备。
        </div>
        <button class="btn btn-primary" onclick="doLogin()">🎮 进入闯关</button>

        <div id="login-error" style="color:#dc2626;font-size:0.85rem;margin-top:10px;text-align:center;display:none;"></div>
    </div>
</div>

<!-- ==================== SCREEN 2: HOME ==================== -->
<div id="screen-home" class="screen">
    <!-- TopBar: 3 stats -->
    <div class="home-topbar">
        <div class="stat-chip stat-streak" onclick="void(0)">
            <div class="num" id="stat-streak">0</div>
            <div class="lbl">🔥 坚持天数</div>
        </div>
        <div class="stat-chip stat-mastered" onclick="openScreen('screen-mastered')">
            <div class="num" id="stat-mastered">0</div>
            <div class="lbl">⭐ 已掌握词</div>
        </div>
        <div class="stat-chip stat-error" onclick="openScreen('screen-errors')">
            <div class="num" id="stat-error">0</div>
            <div class="lbl">📝 错题本</div>
        </div>
    </div>

    <!-- Greeting -->
    <div class="greeting-bar">
        <div>
            <div class="greeting-name" id="greeting-name">Hi！</div>
            <div class="greeting-sub" id="greeting-sub">今天也要加油哦！</div>
        </div>
        <button class="switch-user-btn" onclick="openScreen('screen-login')">切换账号</button>
    </div>

    <!-- Review Alert -->
    <div id="review-alert" class="review-alert">
        <div class="review-alert-title">🎯 复习时间到！你有不少错误单词等待复习</div>
        <div class="review-alert-sub">错误单词超过10个，建议先复习一下再继续新单元！</div>
        <button class="btn btn-accent" style="margin-top:10px;" onclick="startReviewDictation()">🔁 去复习错词</button>
    </div>

    <div class="card">
        <!-- Selector -->
        <div class="selector-row">
            <select id="sel-grade" onchange="onGradeChange()"></select>
            <select id="sel-unit"  onchange="onUnitChange()"></select>
        </div>

        <!-- Settings -->
        <div class="settings-row">
            <div class="setting-group">
                <label>🗣️ 语速</label>
                <select id="set-rate">
                    <option value="0.85">正常</option>
                    <option value="0.7" selected>稍慢</option>
                    <option value="0.55">较慢</option>
                </select>
            </div>
            <div class="setting-group">
                <label>🔁 次数</label>
                <select id="set-repeat">
                    <option value="1">1次</option>
                    <option value="2" selected>2次</option>
                    <option value="3">3次</option>
                </select>
            </div>
            <div class="setting-group">
                <label>✍️ 书写</label>
                <select id="set-wait">
                    <option value="5">5秒</option>
                    <option value="8" selected>8秒</option>
                    <option value="12">12秒</option>
                </select>
            </div>
            <div class="setting-group">
                <label>🔀 顺序</label>
                <select id="set-order">
                    <option value="order" selected>顺序</option>
                    <option value="random">随机</option>
                </select>
            </div>
        </div>

        <button class="btn btn-primary" onclick="startDictation()">🚀 开始听写</button>

        <!-- Preview -->
        <div class="preview-section">
            <div class="divider"></div>
            <div class="preview-label">📋 本单元单词预习</div>
            <div class="preview-grid" id="preview-grid"></div>
        </div>
    </div>
</div>

<!-- ==================== SCREEN 3: RUNNING ==================== -->
<div id="screen-running" class="screen">
    <div class="card">
        <div class="run-header">
            <span class="run-unit-badge" id="run-unit-name">Unit</span>
        </div>
        <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill" id="run-progress-fill"></div></div>
            <div class="progress-text" id="run-progress-text">0 / 0</div>
        </div>
        <div class="word-stage">
            <div class="word-ordinal" id="run-ordinal">第 1 个</div>
            <div class="big-word" id="run-word">Ready</div>
            <div class="status-msg" id="run-status">准备中...</div>

            <div class="countdown-ring" id="countdown-wrap" style="display:none">
                <svg viewBox="0 0 54 54">
                    <circle cx="27" cy="27" r="22"/>
                    <circle class="arc" id="countdown-arc" cx="27" cy="27" r="22"
                        stroke-dasharray="138.2" stroke-dashoffset="0"/>
                </svg>
                <div class="countdown-num" id="countdown-num">8</div>
            </div>
        </div>
        <div class="run-btns">
            <button class="run-btn run-btn-pause" id="pause-btn" onclick="togglePause()">⏸ 暂停</button>
            <button class="run-btn run-btn-stop"  onclick="stopDictation()">⏹ 结束</button>
        </div>
    </div>
</div>

<!-- ==================== SCREEN 4: RESULT ==================== -->
<div id="screen-result" class="screen">
    <div class="card">
        <div class="result-hero">
            <div class="result-star" id="result-star">🌟</div>
            <div class="result-title" id="result-title">听写完成！</div>
            <div class="result-score" id="result-score">0分</div>
            <div class="result-streak" id="result-streak"></div>
        </div>
        <div class="result-encourage" id="result-encourage">加油！继续坚持！</div>

        <div class="result-summary">
            <span class="summary-chip badge-green" id="sum-correct">✅ 0 个全对</span>
            <span class="summary-chip badge-red"   id="sum-wrong">❌ 0 个错误</span>
        </div>

        <div class="divider"></div>
        <div style="font-weight:700;color:#4338ca;font-size:0.85rem;margin-bottom:6px;">📋 核对答案（点击打错）</div>
        <div class="answer-check-grid" id="answer-check-grid"></div>

        <div style="height:16px"></div>
        <button class="btn btn-primary" onclick="submitResult()">✅ 提交结果</button>
        <div style="height:10px"></div>
        <button class="btn" style="background:#f0f0f8;color:#4338ca;padding:12px;width:100%;font-size:0.95rem;font-weight:700;" onclick="openScreen('screen-home')">🏠 返回主页</button>
    </div>
</div>

<!-- ==================== SCREEN 5a: MASTERED ==================== -->
<div id="screen-mastered" class="screen">
    <div class="card">
        <div class="page-header">

// ===================================================================
// 状态管理

let currentUser = null;  // { id, name }
let userData = {};       // 从 localStorage 读出的全量数据

let sessionWords = [];       // 本次听写单词列表

let isRunning = false;
let isPaused = false;

// ===================================================================
// 语音初始化 (美式英语)
// ===================================================================
function loadVoices() {
    if (!synth) return;
    try {
        const voices = synth.getVoices();
        usVoice =
            voices.find(v => v.lang === 'en-US' && v.name.includes('Samantha')) ||
            voices.find(v => v.lang === 'en-US' && v.name.includes('Alex')) ||
            voices.find(v => v.lang === 'en-US' && v.name.toLowerCase().includes('female')) ||
            voices.find(v => v.lang === 'en-US') ||
            voices.find(v => v.lang.startsWith('en'));
    } catch(e) {}
}
try { loadVoices(); } catch(e) {}
try { if (synth && synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices; } catch(e) {}

// ===================================================================
// 数据持久化
// ===================================================================
function saveData() {
    try { localStorage.setItem('eng_userData', JSON.stringify(userData)); } catch(e) {}
}
function loadAllData() {
    try {
        userData = JSON.parse(localStorage.getItem('eng_userData') || '{}');
    } catch(e) { userData = {}; }
}
function ensureUser(uid) {
    if (!userData[uid]) {
        userData[uid] = {
            name: '',
            joinDate: todayStr(),
            lastDictDate: '',
            streak: 0,
            masteredWords: {},   // word -> { count: N }
            errorWords: {},      // word -> { total: N, recent: N }
            sessionHistory: []   // [{date, unit, wrong:[]}]
        };
    }
    return userData[uid];
}
function getUserData() {
    return ensureUser(currentUser.id);
}

// ===================================================================
// 工具函数
// ===================================================================
function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function openScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
    if (id === 'screen-login') {
        document.getElementById('login-id').value = '';
        document.getElementById('login-error').style.display = 'none';
        initLoginScreen();
    }
    if (id === 'screen-home')     renderHome();
    if (id === 'screen-mastered') renderMastered();
    if (id === 'screen-errors')   renderErrors();
}

// ===================================================================
// SCREEN 1: 登录（无需注册，首次输入学号自动创建）
// ===================================================================
function initLoginScreen() {
    loadAllData();
    const chips = document.getElementById('user-chips');
    const box   = document.getElementById('existing-users-box');
    const users = Object.entries(userData).filter(([k]) => k !== '__meta');
    if (users.length > 0) {
        box.style.display = 'block';
        chips.innerHTML = users.map(([id, u]) =>
            `<span class="user-chip" onclick="quickLogin('${id}')">👤 ${u.name || id}</span>`
        ).join('');
    } else {
        box.style.display = 'none';
    }
}
function showLoginError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg; el.style.display = 'block';
}
function quickLogin(uid) {
    const u = userData[uid];
    if (!u) return;
    currentUser = { id: uid, name: u.name || uid };
    afterLogin();
}
function doLogin() {
    try {
        var id = document.getElementById('login-id').value.trim().toUpperCase();
        if (!id) { showLoginError('请输入学号'); return; }
        // 读取数据（容错）
        try { userData = JSON.parse(localStorage.getItem('eng_userData') || '{}'); } catch(e) { userData = {}; }
        // 首次自动创建
        if (!userData[id]) {
            userData[id] = {
                name: id, joinDate: todayStr(), lastDictDate: '', streak: 0,
                masteredWords: {}, errorWords: {}, sessionHistory: []
            };
            try { localStorage.setItem('eng_userData', JSON.stringify(userData)); } catch(e) {}
        }
        currentUser = { id: id, name: userData[id].name || id };
        // 切换页面
        document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
        document.getElementById('screen-home').classList.add('active');
        window.scrollTo(0,0);
        renderHome();
    } catch(err) {
        document.getElementById('login-error').textContent = '出错了：' + err.message;
        document.getElementById('login-error').style.display = 'block';
    }
}
function afterLogin() {
    saveData();
    openScreen('screen-home');
}

function renderHome() {

    // stats（已掌握只统计 mastered=true 的词）
    const masteredCount = Object.values(ud.masteredWords).filter(v => v.mastered).length;
    const errorCount    = Object.keys(ud.errorWords).length;
    document.getElementById('stat-streak').textContent   = ud.streak;
    document.getElementById('stat-mastered').textContent = masteredCount;
    document.getElementById('stat-error').textContent    = errorCount;
    document.getElementById('greeting-name').textContent = `Hi，${ud.name || currentUser.name}！👋`;
    document.getElementById('greeting-sub').textContent  =
        ud.streak > 1 ? `已坚持 ${ud.streak} 天，继续加油！` : '今天也要加油哦！';

    // 复习提醒
    const reviewAlert = document.getElementById('review-alert');
    reviewAlert.style.display = errorCount >= 10 ? 'block' : 'none';

    // 初始化年级选择器（只在首次）
    if (document.getElementById('sel-grade').options.length === 0) {
        initSelectors();
    } else {
        updatePreview();
    }
}

function updateStreak(ud) {
    // 仅在 submitResult 时调用，确保每天完成听写后才计一天
    const today = todayStr();
    if (ud.lastDictDate === today) return; // 今天已记过，不重复计
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
    if (ud.lastDictDate === yStr) {
        ud.streak = (ud.streak || 0) + 1;
    } else if (!ud.lastDictDate) {
        ud.streak = 1;
    } else {
        ud.streak = 1;
    }
    ud.lastDictDate = today;
}

function initSelectors() {
    const gradeEl = document.getElementById('sel-grade');
    gradeEl.innerHTML = '';
    Object.keys(TEXTBOOK_DATA).forEach(key => {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = TEXTBOOK_DATA[key].gradeLabel;
        gradeEl.appendChild(opt);
    });
    onGradeChange();
}
function onGradeChange() {
    const grade  = document.getElementById('sel-grade').value;
    const unitEl = document.getElementById('sel-unit');
    unitEl.innerHTML = '';
    TEXTBOOK_DATA[grade].units.forEach((u, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = u.name;
        unitEl.appendChild(opt);
    });
    updatePreview();
}
function onUnitChange() { updatePreview(); }
function updatePreview() {
    const grade = document.getElementById('sel-grade').value;
    const ui    = parseInt(document.getElementById('sel-unit').value);
    const words = TEXTBOOK_DATA[grade]?.units[ui]?.words || [];
    const grid  = document.getElementById('preview-grid');
    grid.innerHTML = words.map((item,i) => {
        const w  = typeof item === 'object' ? item.w  : item;
        const cn = typeof item === 'object' ? item.cn : '';
        return `<div class="preview-item">
            <span class="num">${i+1}</span>
            <div class="word">${w}</div>
            ${cn ? `<div class="cn">${cn}</div>` : ''}
        </div>`;
    }).join('');
}

// ===================================================================
// SCREEN 3: DICTATION RUNNING
// ===================================================================
function unlockAudio() {
    // Chrome 自动播放限制：必须在用户交互事件链内调用 speak()
    if (!synth) return;
    try {
        const u = new SpeechSynthesisUtterance('');
        synth.speak(u);
        synth.cancel();
    } catch(e) {}
    // 同时确保 voices 已加载
    if (!usVoice) {
        try {
            const voices = synth.getVoices();
            usVoice = voices.find(v => v.lang === 'en-US') ||
                      voices.find(v => v.lang.startsWith('en')) ||
                      voices[0] || null;
        } catch(e) {}
    }
}

function startDictation() {
    unlockAudio();
    const grade = document.getElementById('sel-grade').value;
    const ui    = parseInt(document.getElementById('sel-unit').value);
    const unit  = TEXTBOOK_DATA[grade].units[ui];
    const orderMode = document.getElementById('set-order').value;

    isReviewMode = false;
    // 统一成 {w, cn} 格式
    let words = unit.words.map(item => typeof item === 'object' ? item : {w: item, cn: ''});
    // 随机模式：Fisher-Yates 打乱，保证全部覆盖
    if (orderMode === 'random') {
        words = [...words];
        for (let i = words.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [words[i], words[j]] = [words[j], words[i]];
        }
    }
    sessionWords = words;
    sessionUnitKey = `${grade}__${ui}`;

    document.getElementById('run-unit-name').textContent =
        unit.name + (orderMode === 'random' ? ' 🔀' : '');
    openScreen('screen-running');
    runDictation();
}
function startReviewDictation() {
    unlockAudio();
    const ud = getUserData();
    const errWords = Object.keys(ud.errorWords);
    if (errWords.length === 0) { alert('错题本是空的！'); return; }

    isReviewMode = true;
    // 从 TEXTBOOK_DATA 里查中文，找不到就留空
    const allWords = {};
    Object.values(TEXTBOOK_DATA).forEach(grade => {
        grade.units.forEach(unit => {
            unit.words.forEach(item => {
                const w  = typeof item === 'object' ? item.w  : item;
                const cn = typeof item === 'object' ? item.cn : '';
                allWords[w] = cn;
            });
        });
    });
    sessionWords = errWords.slice(0, 20).map(w => ({w, cn: allWords[w] || ''}));
    sessionUnitKey = '__review__';
    document.getElementById('run-unit-name').textContent = '🔁 错词复习';
    openScreen('screen-running');
    runDictation();
}

async function runDictation() {
    isRunning = true; isPaused = false;
    sessionIndex = 0;
    wrongInSession = [];

    const wordEl    = document.getElementById('run-word');
    const statusEl  = document.getElementById('run-status');
    const ordinalEl = document.getElementById('run-ordinal');
    const total = sessionWords.length;

    // iOS warmup
    if (synth) {
        synth.cancel();
        const warmUp = new SpeechSynthesisUtterance('');
        synth.speak(warmUp);
    }

    // 倒计时
    statusEl.textContent = '准备开始...';
    for (let i = 3; i > 0; i--) {
        wordEl.textContent = i;
        await sleep(900);
    }
    wordEl.textContent = '';

    while (sessionIndex < total && isRunning) {
        updateRunProgress();
        await waitWhilePaused();
        if (!isRunning) break;

        const word = sessionWords[sessionIndex];
        const wordText = typeof word === 'object' ? word.w : word;
        ordinalEl.textContent = `第 ${sessionIndex + 1} 个 / 共 ${total} 个`;
        wordEl.style.animation = 'none';
        wordEl.offsetHeight;
        wordEl.style.animation = 'popIn 0.35s both';
        wordEl.textContent = `#${sessionIndex + 1}`;
        wordEl.style.color = '#6b7280';

        statusEl.textContent = '🔊 朗读中...';

        const repeat = parseInt(document.getElementById('set-repeat').value);
        for (let r = 0; r < repeat; r++) {
            await waitWhilePaused();
            if (!isRunning) break;
            await speakWord(wordText);
            if (r < repeat - 1) await sleep(1000);
        }

        if (!isRunning) break;

        // 书写倒计时
        wordEl.style.color = '#e0e7ff';
        statusEl.textContent = '✍️ 书写中...';
        const waitSec = parseInt(document.getElementById('set-wait').value);
        await runCountdown(waitSec);

        sessionIndex++;
    }

    if (isRunning) showResult();
}

async function runCountdown(seconds) {
    const wrap     = document.getElementById('countdown-wrap');
    const arcEl    = document.getElementById('countdown-arc');
    const numEl    = document.getElementById('countdown-num');
    const total_ms = seconds * 1000;
    const R = 22, C = 2 * Math.PI * R; // circumference ≈ 138.2

    wrap.style.display = 'block';
    arcEl.style.strokeDasharray  = C;
    arcEl.style.strokeDashoffset = 0;

    const start = Date.now();
    while (true) {
        if (!isRunning) break;
        await waitWhilePaused();
        const elapsed = Date.now() - start;
        const remain  = Math.max(0, total_ms - elapsed);
        const frac    = remain / total_ms;
        arcEl.style.strokeDashoffset = C * (1 - frac);
        numEl.textContent = Math.ceil(remain / 1000);
        if (remain <= 0) break;
        await sleep(80);
    }
    wrap.style.display = 'none';
}

function updateRunProgress() {
    const total = sessionWords.length;
    const pct   = (sessionIndex / total) * 100;
    document.getElementById('run-progress-fill').style.width = pct + '%';
    document.getElementById('run-progress-text').textContent = `${sessionIndex} / ${total}`;
}

async function waitWhilePaused() {
    while (isPaused && isRunning) await sleep(200);
}

function togglePause() {
    isPaused = !isPaused;
    const btn = document.getElementById('pause-btn');
    if (isPaused) {
        if (synth) synth.cancel();
        btn.textContent = '▶ 继续';
        document.getElementById('run-status').textContent = '⏸ 已暂停';
    } else {
        btn.textContent = '⏸ 暂停';
    }
}
function stopDictation() {
    if (confirm('确定要提前结束吗？')) {
        isRunning = false;
        if (synth) synth.cancel();
        openScreen('screen-home');
    }
}

// 美式英语语音朗读
function speakWord(text) {
    return new Promise(resolve => {
        if (!synth) { setTimeout(resolve, 800); return; }

        // voices 懒加载兜底（onvoiceschanged 可能没触发）
        if (!usVoice) {
            try {
                const voices = synth.getVoices();
                usVoice = voices.find(v => v.lang === 'en-US') ||
                          voices.find(v => v.lang.startsWith('en')) ||
                          voices[0] || null;
            } catch(e) {}
        }

        synth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang  = 'en-US';
        u.rate  = parseFloat(document.getElementById('set-rate').value);
        u.pitch = 1.0;

        if (usVoice) u.voice = usVoice;

        currentUtterance = u;
        u.onend   = () => { currentUtterance = null; resolve(); };
        u.onerror = () => { currentUtterance = null; resolve(); };
        synth.speak(u);

        // iOS 超时兜底
        const timeout = Math.max(5000, text.length * 600);
        setTimeout(() => { if (currentUtterance === u) { currentUtterance = null; resolve(); } }, timeout);
    });
}

// ===================================================================
// SCREEN 4: RESULT
// ===================================================================
function showResult() {
    openScreen('screen-result');
    isRunning = false;

    const grid = document.getElementById('answer-check-grid');
    grid.innerHTML = sessionWords.map((item, i) => {
        const w  = typeof item === 'object' ? item.w  : item;
        const cn = typeof item === 'object' ? item.cn : '';
        return `<div class="answer-check-item" id="aci-${i}">
            <span class="num">${i+1}</span>
            <div class="word">${w}</div>
            ${cn ? `<div class="cn">${cn}</div>` : ''}
            <div class="check-box" id="cb-${i}" onclick="toggleWrong(${i})"></div>
        </div>`;
    }).join('');

    updateResultSummary();

    // 坚持天数/鼓励语
    const ud = getUserData();
    document.getElementById('result-streak').textContent = `🔥 今天是你坚持的第 ${ud.streak} 天`;
    refreshEncourage(0, sessionWords.length);
}

function toggleWrong(idx) {
    const item = document.getElementById(`aci-${idx}`);
    const cb   = document.getElementById(`cb-${idx}`);
    const item_ = sessionWords[idx];
    const word = typeof item_ === 'object' ? item_.w : item_;
    const isNowWrong = !item.classList.contains('wrong');
    item.classList.toggle('wrong', isNowWrong);
    cb.classList.toggle('checked', isNowWrong);
    cb.textContent = isNowWrong ? '✗' : '';
    if (isNowWrong) { if (!wrongInSession.includes(word)) wrongInSession.push(word); }
    else { wrongInSession = wrongInSession.filter(w => w !== word); }
    updateResultSummary();
}

function updateResultSummary() {
    const wrong   = wrongInSession.length;
    const correct = sessionWords.length - wrong;
    const score   = Math.round((correct / sessionWords.length) * 100);
    document.getElementById('result-score').textContent = score + '分';
    document.getElementById('sum-correct').textContent  = `✅ ${correct} 个全对`;
    document.getElementById('sum-wrong').textContent    = `❌ ${wrong} 个错误`;
    document.getElementById('result-star').textContent  = score >= 90 ? '🌟' : score >= 70 ? '🎉' : '💪';
    refreshEncourage(wrong, sessionWords.length);
}

function refreshEncourage(wrong, total) {
    const ud = getUserData();
    let msg = '';
    if (wrong === 0)         msg = `太棒了！全部正确！你是单词大师！🏆`;
    else if (wrong <= 2)     msg = `非常好！只错了 ${wrong} 个，继续加油！😊`;
    else if (wrong <= total*0.3) msg = `不错哦！已经坚持了 ${ud.streak} 天，为你点赞！⭐`;
    else                     msg = `没关系，多练几次就记住啦！坚持就是胜利！💪`;
    document.getElementById('result-encourage').textContent = msg;
}

function submitResult() {
    const ud = getUserData();

    // 记录错词
    wrongInSession.forEach(w => {
        ud.errorWords[w] = (ud.errorWords[w] || 0) + 1;
        // 清除掌握记录中的连续正确次数
        if (ud.masteredWords[w]) delete ud.masteredWords[w];
    });

    // 记录本次听写的正确词（连续2次不错→掌握）
    sessionWords.forEach(item => {
        const w = typeof item === 'object' ? item.w : item;
        if (wrongInSession.includes(w)) return;
        if (!ud.masteredWords[w]) ud.masteredWords[w] = { correctStreak: 0 };
        ud.masteredWords[w].correctStreak = (ud.masteredWords[w].correctStreak || 0) + 1;
        if (ud.masteredWords[w].correctStreak >= 2) {
            ud.masteredWords[w].mastered = true;
            delete ud.errorWords[w];
        }
    });

    // 更新坚持天数（只在完成听写后计）
    updateStreak(ud);

    saveData();
    openScreen('screen-home');
}

// ===================================================================
// SCREEN 5a: MASTERED
// ===================================================================
function renderMastered() {
    const ud      = getUserData();
    const mastered = Object.entries(ud.masteredWords).filter(([,v]) => v && v.mastered);
    const el = document.getElementById('mastered-content');
    if (mastered.length === 0) {
        el.innerHTML = '<div class="empty-tip">还没有掌握的单词，加油听写！🌱</div>';
        return;
    }
    // 从数据表查中文
    const cnMap = buildCnMap();
    el.innerHTML = `<div style="color:var(--sub);font-size:0.8rem;margin-bottom:8px;">共掌握 ${mastered.length} 个单词 🎉</div>` +
        `<div class="word-list-grid">` +
        mastered.map(([w]) =>
            `<div class="word-card"><div class="w">${w}</div>${cnMap[w]?`<div class="wc">${cnMap[w]}</div>`:''}<div class="cnt">已掌握 ⭐</div></div>`
        ).join('') +
        `</div>`;
}

// ===================================================================
// SCREEN 5b: ERRORS
// ===================================================================
function renderErrors() {
    const ud     = getUserData();
    const errors = Object.entries(ud.errorWords);
    const el     = document.getElementById('errors-content');
    const btn    = document.getElementById('error-review-btn');
    const cnMap  = buildCnMap();

    if (errors.length === 0) {
        el.innerHTML = '<div class="empty-tip">错题本是空的，你太厉害了！🌟</div>';
        btn.style.display = 'none';
        return;
    }
    btn.style.display = 'block';
    el.innerHTML = `<div style="color:var(--sub);font-size:0.8rem;margin-bottom:8px;">共 ${errors.length} 个错词，别忘了复习哦！</div>` +
        `<div class="word-list-grid">` +
        errors.sort((a,b) => b[1]-a[1]).map(([w, cnt]) =>
            `<div class="word-card"><div class="w">${w}</div>${cnMap[w]?`<div class="wc">${cnMap[w]}</div>`:''}<div class="cnt">错了 ${cnt} 次</div></div>`
        ).join('') +
        `</div>`;
}

// 建立全局 word→cn 映射表
function buildCnMap() {
    const map = {};
    Object.values(TEXTBOOK_DATA).forEach(grade => {
        grade.units.forEach(unit => {
            unit.words.forEach(item => {
                if (typeof item === 'object') map[item.w] = item.cn;
            });
        });
    });
    return map;
}

// ===================================================================
// 页面启动入口（放在所有函数定义之后）
// ===================================================================
(function init() {
    try {
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        if (isIOS) document.getElementById('iosTip').style.display = 'block';
    } catch(e) {}
    initLoginScreen();
})();
</script>
